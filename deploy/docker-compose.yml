# Caption Push — self-contained deployment
#
# Prerequisites: Docker Desktop (Windows / macOS / Linux)
#
# First run (builds images from GitHub — takes 5-10 min):
#   docker compose up -d --build
#
# Open in browser after startup:
#   Operator console  →  http://localhost:4000
#   Display 1 (VNC)   →  http://localhost:6080
#   Display 2 (VNC)   →  http://localhost:6081
#
# Stop:    docker compose down
# Update:  docker compose down && docker compose up -d --build --pull always

services:

  bridge:
    build:
      context: https://github.com/markscott/caption-push.git#main
      dockerfile: docker/Dockerfile.bridge
    ports:
      - "4000:3000"    # Operator UI
      - "5555:5555"    # ZeroMQ PUB (real Pi displays connect here from LAN)
    environment:
      NODE_ENV: production
      PORT: "3000"
      ZMQ_ADDRESS: "tcp://*:5555"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  display1:
    restart: unless-stopped
    build:
      context: https://github.com/markscott/caption-push.git#main
      dockerfile: docker/Dockerfile.display
    ports:
      - "6080:6080"    # Display 1 (noVNC)
    environment:
      DISPLAY_ID: "1"
      CONTROLLER_ADDRESS: "tcp://bridge:5555"
      PANEL_WIDTH: "1920"
      PANEL_HEIGHT: "360"
      FONT_SIZE: "320"
      MAX_LINES: "1"
      PIXEL_SIZE: "1"
      PIXEL_GAP: "0"
      FONT_PATH: "/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf"
      PYTHONUNBUFFERED: "1"
    depends_on:
      bridge:
        condition: service_healthy

  display2:
    restart: unless-stopped
    build:
      context: https://github.com/markscott/caption-push.git#main
      dockerfile: docker/Dockerfile.display
    ports:
      - "6081:6080"    # Display 2 (noVNC)
    environment:
      DISPLAY_ID: "2"
      CONTROLLER_ADDRESS: "tcp://bridge:5555"
      PANEL_WIDTH: "1920"
      PANEL_HEIGHT: "360"
      FONT_SIZE: "320"
      MAX_LINES: "1"
      PIXEL_SIZE: "1"
      PIXEL_GAP: "0"
      FONT_PATH: "/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf"
      PYTHONUNBUFFERED: "1"
    depends_on:
      bridge:
        condition: service_healthy
