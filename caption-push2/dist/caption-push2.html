    :root {
      --bg:      #0f0f17;
      --panel:   #16162a;
      --surface: #1e1e36;
      --accent:  #e94560;
      --accent2: #0f3460;
      --text:    #eaeaf8;
      --dim:     #7070a0;
      --current: #1a2a5e;
      --border:  #2a2a50;
      --green:   #2ecc71;
      --yellow:  #f39c12;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
    }

    /* \u2500\u2500 App grid \u2500\u2500 */
    .app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 320px 1fr;
      grid-template-areas: "toolbar toolbar" "script main" "status status";
      height: 100vh;
    }

    /* \u2500\u2500 Toolbar \u2500\u2500 */
    .toolbar {
      grid-area: toolbar;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    .toolbar h1 {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-right: 8px;
      white-space: nowrap;
    }
    .btn {
      padding: 6px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { opacity: 0.65; }
    .btn-primary   { background: var(--accent);   color: #fff; }
    .btn-secondary { background: var(--surface);  color: var(--text); }
    .btn-outline   { background: transparent; color: var(--dim); border: 1px solid var(--border); }
    .btn-small     { padding: 4px 10px; font-size: 12px; }

    .slider-control {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--dim);
      font-size: 12px;
    }
    .slider-control input[type=range] {
      accent-color: var(--accent);
      cursor: pointer;
    }
    .brightness-control { margin-left: auto; }
    .brightness-control input { width: 90px; }
    .speed-control input { width: 130px; }

    .disp-dots {
      display: flex;
      gap: 5px;
      align-items: center;
      margin-left: 6px;
    }
    .disp-dot-wrap {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      color: var(--dim);
      cursor: pointer;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #333;
      transition: background 0.3s;
    }
    .dot.on { background: var(--green); }
    .btn-add-disp {
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: 4px;
      color: var(--dim);
      padding: 4px 9px;
      font-size: 11px;
      cursor: pointer;
    }
    .btn-add-disp:hover { color: var(--text); border-color: var(--dim); }

    /* \u2500\u2500 Script panel \u2500\u2500 */
    .script-panel {
      grid-area: script;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .script-panel-header {
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 700;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .scene-controls { display: flex; gap: 4px; }
    .scene-controls button {
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      border-radius: 3px;
      padding: 1px 6px;
      font-size: 10px;
      cursor: pointer;
    }
    .scene-controls button:hover { color: var(--text); border-color: var(--dim); }

    .script-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .script-list::-webkit-scrollbar { width: 4px; }
    .script-list::-webkit-scrollbar-track { background: transparent; }
    .script-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .scene-group + .scene-group { border-top: 1px solid var(--border); }
    .scene-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      cursor: pointer;
      user-select: none;
      background: var(--panel);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .scene-header:hover { background: var(--surface); }
    .scene-header.collapsed { color: var(--dim); }
    .scene-chevron { font-size: 9px; flex-shrink: 0; }
    .scene-title   { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .script-line {
      display: flex;
      gap: 10px;
      padding: 7px 12px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.08s;
      font-size: 13px;
      line-height: 1.4;
    }
    .script-line:hover { background: var(--surface); }
    .script-line.current { background: var(--current); border-left-color: var(--accent); }
    .script-line.past    { color: var(--dim); }
    .script-line.metadata {
      color: var(--yellow); font-size: 11px; font-style: italic;
      cursor: default; border-left-color: transparent !important; background: none !important;
    }
    .line-num {
      color: var(--dim); font-size: 11px; min-width: 26px;
      padding-top: 1px; font-variant-numeric: tabular-nums; flex-shrink: 0;
    }
    .script-line.current .line-num { color: var(--accent); }

    .script-empty {
      padding: 16px 12px;
      color: var(--dim);
      font-size: 13px;
    }

    /* \u2500\u2500 Main area \u2500\u2500 */
    .main-area {
      grid-area: main;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .main-area::-webkit-scrollbar { width: 4px; }
    .main-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Now Showing */
    .now-showing {
      background: var(--current);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .section-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--dim); margin-bottom: 8px;
    }
    .now-showing .section-label { padding: 8px 24px 4px; }
    /* Outer clip \u2014 height driven by JS to match scaled inner */
    #sim-display {
      width: 100%;
      overflow: hidden;
      position: relative;
      border-top: 1px solid #111;
    }
    /* 1920\xD7360 reference surface \u2014 scaled down by JS transform */
    #sim-inner {
      width: 1920px;
      height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: top left;
      background: #000;
      overflow: hidden;
      position: relative;
    }
    #sim-hold-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #e94560;
      color: #fff;
      font-size: 20px;
      font-family: monospace;
      padding: 4px 14px;
      border-radius: 4px;
      letter-spacing: 0.08em;
      display: none;
    }
    #sim-hold-badge.visible { display: block; }
    /* Wrapper for scroll \u2014 same as display.ts #caption-wrapper */
    #sim-wrapper {
      width: 100%;
      padding: 0 3rem;
      overflow: hidden;
    }
    /* Caption text \u2014 same defaults as display.ts #caption-text */
    #sim-caption {
      display: block;
      font-size: 2rem;
      text-align: center;
      font-family: Arial, sans-serif;
      color: #2a2a2a;
      line-height: 1.25;
      word-break: break-word;
      white-space: pre-wrap;
    }

    /* Next up */
    .next-up {
      background: var(--surface);
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .next-up .section-label { margin-bottom: 6px; }
    .next-text { font-size: 18px; color: var(--dim); line-height: 1.3; word-break: break-word; }

    /* Manual / caption entry */
    .caption-entry {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      background: var(--panel);
      flex-shrink: 0;
    }
    .caption-entry input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 15px;
      outline: none;
    }
    .caption-entry input:focus { border-color: var(--accent); }
    .caption-entry input::placeholder { color: var(--dim); }

    /* Style controls */
    .style-section {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      flex-shrink: 0;
    }
    .style-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 20px;
      align-items: center;
    }
    .style-field {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .style-field label {
      font-size: 11px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    .style-field input[type=range] {
      width: 80px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .style-field select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: 3px 6px;
      font-size: 12px;
      outline: none;
    }
    .style-field input[type=color] {
      width: 28px; height: 22px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: none;
      cursor: pointer;
      padding: 1px;
    }
    .style-val { font-size: 11px; color: var(--dim); font-family: monospace; min-width: 34px; }
    .btn-size-step {
      width: 22px; height: 22px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 3px;
      color: var(--text); cursor: pointer; font-size: 14px; line-height: 1;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      padding: 0;
    }
    .btn-size-step:hover { background: var(--current); border-color: var(--accent); }
    .align-grp { display: flex; gap: 2px; }
    .btn-align {
      padding: 2px 7px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--dim);
      cursor: pointer;
      font-size: 12px;
    }
    .btn-align.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Presets */
    .presets-section {
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      flex-shrink: 0;
    }
    .presets-hdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .preset-list { display: flex; flex-wrap: wrap; gap: 5px; }
    .preset-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .preset-chip:hover { background: var(--current); }
    .chip-del { color: var(--dim); cursor: pointer; padding: 0 2px; }
    .chip-del:hover { color: var(--accent); }

    /* Display launchers */
    .display-launchers {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      flex-shrink: 0;
    }
    .launcher-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }
    .launcher-label { font-size: 13px; color: var(--text); min-width: 70px; }

    /* Keyboard hints */
    .kbd-hints {
      padding: 10px 24px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      background: var(--panel);
      flex-shrink: 0;
    }
    .kbd-hint {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--dim);
    }
    kbd {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 6px;
      font-size: 11px;
      font-family: monospace;
      color: var(--text);
    }

    /* Status bar */
    .status-bar {
      grid-area: status;
      padding: 6px 14px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--dim);
      display: flex;
      justify-content: space-between;
    }
    .status-progress { color: var(--text); font-variant-numeric: tabular-nums; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center; z-index: 200;
    }
    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.25rem; width: 300px;
      display: flex; flex-direction: column; gap: 0.65rem;
    }
    .modal h3 { font-size: 14px; color: var(--text); }
    .modal input[type=text] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: 6px 10px; font-size: 13px; outline: none;
    }
    .modal input[type=text]:focus { border-color: var(--accent); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 6px; }
    #speed-row-style { display: none; }
  `,document.head.appendChild(B),document.body.innerHTML=`
